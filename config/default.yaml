filepaths:
  continue_from_checkpoint: false
  out_dir: '../outputs'
  train_set: '../filepath'
  val_set: '../filepath'
  log_level: 'info'

params: 
  seed: 42
  nx: 256
  Lx: 6.283185307179586  # 2π
  beta: 100
  kmin: 0.0
  kmax: 3.0

plotting:
  nsteps: 10000
  dt: 0.0005
  cadence: 100
  animate: []
  final: []
  stepper: AB3Stepper
  auto_dt: false
  cfl: 0.1

forcing:
  k_f: 8.0           # central forcing wavenumber
  k_width: 2.0       # width of the ring
  epsilon: 0.001     # energy injection rate

ml:
  enabled: true
  model: zero
  spin_up: 10.0
  input_channels:
  output_channels: 
  num_epochs: 10
  optimiser: AdamW
  batches_per_epoch: 100
  lr_schedule: idk rn
  end_lr: yeha fiuck knows