filepaths:
  continue_from_checkpoint: false
  out_dir: '../outputs'
  train_set: '../filepath'
  val_set: '../filepath'
  log_level: 'info'

params: 
  seed: 42
  nx: 64
  Lx: 6.283185307179586  # 2π
  beta: 10
  kmin: 4.0 
  kmax: 10.0
  nz: 1
  # multi-layer model parameters (only used if nz>1)
  Lz: 50
  rek: 5.787e-7 # this might balls up with the number stuff - check if i should remove config file and just yaml it 
  rd: 15.0
  delta: 0.25
  U1: 0.0
  U2: 0.0
  hr_nx: 128 # bit janky for the high res data

plotting:
  nsteps: 1000
  dt: 0.01
  cadence: 100
  animate: []
  final: []
  auto_dt: true
  njets: 6
  spinup: 100000
  cfl: 0.5


forcing:
  k_f: 8.0           # central forcing wavenumber
  k_width: 2.0       # width of the ring
  epsilon: 0.001     # energy injection rate

ml:
  enabled: true
  model_type: cnn
  device: 'gpu' # 'cpu' or 'gpu' <-- gotta be careful here w cuda supported jaxlib. 
  use_float64: false
  n_train: 7
  n_test: 2
  optimiser: AdamW
  batch_steps: 100 # temporal context - how far the trained model sees in advance
  batch_size: 5 # this is the number of trajs generated in a batch before saving to disk
  minibatch_size: 48 # number of samples in a training batch per update
  prefetch: 3       # prefetch a few batches to aid efficiency


architectures:
  cnn:
    learning_rate: 0.0001
    nlayers: 3
    width: 64
    kernel_size: 3
    padding: 1
    activation: "tanh"
  unet:
    learning_rate: 0.0005
    base_channels: 32
    depth: 4
  fno:
    learning_rate: 0.0005
    width: 64
    modes2: 16
    modes1: 16
    depth: 4
  zero:
    learning_rate: 0 # obviously not needed but coded in regardless

  
